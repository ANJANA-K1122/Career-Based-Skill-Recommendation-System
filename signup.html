<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sign Up Page</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f4f4f9;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            margin: 0;

        }

        .signup-container {

            background-color: #ffffff;

            padding: 40px;

            border-radius: 10px;

            box-shadow: 0 4px 8px rgba(0,0,0,0.2);

            text-align: center;

        }

        input {

            width: 100%;

            padding: 10px;

            margin: 10px 0;

            border-radius: 5px;

            border: 1px solid #ddd;

        }

        button {

            width: 100%;

            padding: 10px;

            background-color: #4a6fa5;

            color: white;

            border: none;

            border-radius: 5px;

            cursor: pointer;

            margin-bottom: 10px;

        }

        button:hover {

            background-color: #3a5a84;

        }

        a {

            text-decoration: none;

            color: #4a6fa5;

        }

    </style>

</head>

<body>

    <div class="signup-container">

        <h1>
            Career-Skill Roadmap Generator
        </h1>

        <h2>
            Sign Up
        </h2>

        <input
            type="text"
            id="newUsername"
            placeholder="New Username"
            required
        >

        <input
            type="password"
            id="newPassword"
            placeholder="New Password"
            required
        >

        <button onclick="signUp()">
            Sign Up
        </button>

        <p>
            Already have an account?
            <a href="/">Login</a>
        </p>

    </div>

    <script>

        function signUp() {

            const newUsername =
                document.getElementById(
                    "newUsername"
                ).value;

            const newPassword =
                document.getElementById(
                    "newPassword"
                ).value;

            if (
                newUsername &&
                newPassword
            ) {

                localStorage.setItem(
                    "username",
                    newUsername
                );

                localStorage.setItem(
                    "password",
                    newPassword
                );

                alert(
                    "Account created successfully!"
                );

                window.location.href =
                    "/";

            }

            else {

                alert(
                    "Please fill out all fields."
                );

            }

        }

    </script>

</body>

</html>
